<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write a Story - SereneReader</title>
  <link rel="icon" href="favicon.svg?v=1" type="image/svg+xml">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style2.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header id="page-header">
    
    <!-- Logo + Back Button -->
    <div id="header-left">
      <!-- Back to Home -->
      <a id="back-home-btn" href="index.html" title="Back to Home">
        <!-- Arrow Left Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 19-7-7 7-7"/>
          <path d="M19 12H5"/>
        </svg>
      </a>

      <!-- Site Logo -->
      <a id="site-logo" href="index.html">
        SereneReader.
      </a>
    </div>

    <!-- Right Side Buttons -->
    <div id="header-right">
      <button id="publish-btn">Publish</button>
    </div>
  </header>

  <!-- ===== MAIN EDITOR ===== -->
  <main id="editor-main">
    
    <!-- Cover Image Placeholder -->
    <div id="cover-placeholder">
        <button id="add-cover-btn">
          <!-- Image Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
            fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
            <circle cx="9" cy="9" r="2"/>
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
          </svg>
          <span>Cover Image will be Auto-generated</span>
        </button>
    </div>

    <!-- Title Input -->
    <div id="title-container">
      <input
        id="story-title"
        type="text"
        placeholder="Title"
        class="editor-input"
        autocomplete="off"
      />
    </div>

    <!-- Story Textarea -->
    <div id="story-container">
      <textarea
        id="story-textarea"
        placeholder="Tell your story..."
        class="editor-input no-scrollbar"
        rows="1"
        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
      ></textarea>
    </div>

  </main>

    <!-- ================= FOOTER ================= -->
  <footer id="site-footer">
    <div class="footer-container">
      <p>
        &copy; 2025 SereneReader. All rights reserved.
      </p>
      <p class="unsplash-note">
        Cover images powered by <a href="https://unsplash.com" target="_blank" rel="noopener noreferrer">Unsplash</a>.
      </p>
    </div>
  </footer>

  <script src="writescript.js" type="text/JavaScript" defer></script>
</body>
</html>
